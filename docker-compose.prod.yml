services:
  # ── API Server ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rcm-network
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2

  # ── Celery Worker ──────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      - redis
      - postgres
    networks:
      - rcm-network
    command: >
      celery -A src.infrastructure.queue.celery_app worker
      -l info -Q coding,billing,payments,denials,edi
      --concurrency=2

  # ── Celery Beat (Scheduler) ────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      - redis
    networks:
      - rcm-network
    command: celery -A src.infrastructure.queue.celery_app beat -l info

  # ── Nginx (Reverse Proxy + Frontends) ──────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui/staff-portal/dist:/var/www/staff-portal:ro
      - ./ui/provider-portal/dist:/var/www/provider-portal:ro
    depends_on:
      - api
    networks:
      - rcm-network

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medclaim_db
      POSTGRES_USER: medclaim
      POSTGRES_PASSWORD: "265d79badc1a479e5278d7363e0fd66b"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rcm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medclaim"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "c37a68e6a0586bd217c0e6da1d3ac60f"
    volumes:
      - redisdata:/data
    networks:
      - rcm-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "c37a68e6a0586bd217c0e6da1d3ac60f", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector DB) ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - rcm-network

  # ── MinIO (Object Storage) ────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: medclaim_minio
      MINIO_ROOT_PASSWORD: "e4c8053ade06a397650846dfb274c03f"
    volumes:
      - miniodata:/data
    networks:
      - rcm-network
    command: server /data

  # ── Cloudflare Tunnel ──────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file: .env.prod
    depends_on:
      - nginx
    networks:
      - rcm-network

networks:
  rcm-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata: