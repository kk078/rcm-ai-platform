# Added during the Docker-Desktop -> WSL2-native migration (2026-06).
# 1) build.network: host  — so build-time apt/pip reach the Windows host proxy.
# 2) celery healthchecks  — celery-worker/beat were inheriting the API Dockerfile's
#    `curl localhost:8000/health` HEALTHCHECK, which always fails for a worker (no web
#    server) and showed a false "unhealthy". Replaced with a real celery check; beat
#    (a scheduler with no inspect endpoint) uses a process check.
services:
  api:
    build:
      network: host
  ai-agents:
    build:
      network: host
  nginx:
    build:
      network: host
  celery-worker:
    build:
      network: host
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.infrastructure.queue.celery_app inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 90s
  celery-beat:
    build:
      network: host
    healthcheck:
      test: ["CMD-SHELL", "grep -qa beat /proc/1/cmdline || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
