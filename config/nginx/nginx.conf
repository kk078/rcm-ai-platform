# ── Aethera AI — Production Nginx Config ─────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Docker internal DNS resolver ─────────────────────────────────────────
    # CRITICAL: This tells nginx to use Docker's embedded DNS (127.0.0.11) so
    # upstream hostnames like "api" are resolved at *request time*, not at nginx
    # startup.  Without this, nginx crashes with "host not found in upstream"
    # whenever it starts before the api container's DNS entry is ready.
    resolver 10.89.0.1 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/x-font-ttf font/opentype image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # NOTE: The upstream block has been replaced with a $api_backend variable.
    # Using a variable in proxy_pass forces nginx to defer DNS resolution to
    # request time via the resolver directive above.  A static upstream block
    # is resolved once at startup, which causes the crash loop we observed.

    # ── Main Server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Upstream address as a variable so DNS is resolved per-request.
        set $api_backend http://api:8000;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Nginx health check (for Docker healthcheck) ───────────────────────
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         $api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering    off;

            # Remove size limits for file uploads (ERA files, documents)
            client_max_body_size 50m;
        }

        # ── Auth rate limiting ────────────────────────────────────────────────
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass         $api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API docs (accessible in all envs for now) ─────────────────────────
        location /docs {
            proxy_pass $api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass $api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Provider Portal (served at /portal/) ──────────────────────────────
        location /portal/ {
            alias /app/provider-portal/;
            try_files $uri $uri/ /portal/index.html;

            # Never cache index.html — always serve fresh so asset paths stay current
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires 0;

            # Cache static assets aggressively (content-hashed filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        location = /portal {
            return 301 /portal/;
        }

        # ── Staff Portal (root) ───────────────────────────────────────────────
        location / {
            root /app/frontend;
            try_files $uri $uri/ /index.html;

            # Never cache index.html — always serve fresh
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires 0;

            # Cache static assets aggressively (content-hashed filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
