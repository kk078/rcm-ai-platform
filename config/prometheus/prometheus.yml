global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: aethera-ai

scrape_configs:
  - job_name: aethera-api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
