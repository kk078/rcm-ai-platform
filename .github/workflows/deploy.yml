name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # Push-to-deploy on the machine that hosts the Podman stack.
  # Runs on a SELF-HOSTED runner (outbound-only to GitHub — no inbound SSH/tunnel needed,
  # which sidesteps the local WSL/Hyper-V networking issue).
  #
  # Stays SKIPPED (green) until BOTH are true:
  #   1. A self-hosted runner is registered:  repo Settings -> Actions -> Runners -> New self-hosted runner
  #   2. Repo variable DEPLOY_ENABLED = true:  repo Settings -> Secrets and variables -> Actions -> Variables
  deploy:
    needs: test
    runs-on: [self-hosted]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Deploy locally (Podman)
        shell: pwsh
        run: D:\rcm-ai-platform\scripts\deploy-local.ps1
